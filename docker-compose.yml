services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: securix
      POSTGRES_PASSWORD: securix
      POSTGRES_DB: securix
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "8001:8000"
    depends_on:
      - db
      - redis

  worker:
    build:
      context: ./backend
    command: celery -A app.tasks.audit_tasks.celery_app worker --loglevel=info -Q default
    env_file:
      - ./backend/.env
    depends_on:
      - backend
      - redis
      - db

  worker_prowler:
    build:
      context: ./backend
      dockerfile: Dockerfile.prowler
    command: celery -A app.tasks.audit_tasks.celery_app worker --loglevel=info -Q prowler
    env_file:
      - ./backend/.env
    depends_on:
      - backend
      - redis
      - db

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8001/api
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:
  pg_data:
